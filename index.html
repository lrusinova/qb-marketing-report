<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="robots" content="noindex,nofollow"/>
<title>QB Marketing — Executive Dashboard H2 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#002855;--navy2:#001832;
  --qb-dark:#1A0F1E;--qb-teal:#00A68F;--qb-teal2:#007D6A;
  --orange:#FF6820;--orange-lt:rgba(255,104,32,.12);
  --blue:#0066D6;--blue-lt:#EBF3FF;
  --green:#14A558;--green-lt:#E6F7EE;
  --amber:#F59E0B;--amber-lt:#FEF3C7;
  --red:#E53935;--red-lt:#FFEBEE;
  --purple:#7C3AED;--purple-lt:#f3eeff;
  --teal:#0891B2;--emerald:#059669;
  --g50:#F8FAFC;--g100:#F1F5F9;--g200:#E2E8F0;
  --g300:#CBD5E1;--g400:#94A3B8;--g500:#64748B;
  --g600:#475569;--g700:#334155;--g900:#0F172A;
  --bg:#EAEFF5;
  --sh:0 1px 3px rgba(0,40,85,.07),0 4px 14px rgba(0,40,85,.05);
  --sh2:0 8px 32px rgba(0,40,85,.14),0 2px 8px rgba(0,40,85,.07);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--g900);font-size:14px;line-height:1.5;min-height:100vh}
a{color:var(--blue);text-decoration:none}a:hover{text-decoration:underline}
button{font-family:inherit;cursor:pointer}

/* ── HEADER ─────────────────────────────────────────── */
.hdr{background:var(--qb-dark);border-bottom:2px solid rgba(0,166,143,.35);padding:0 28px;display:flex;align-items:center;gap:14px;height:60px;position:sticky;top:0;z-index:100;box-shadow:0 4px 24px rgba(0,0,0,.4)}
.qb-mark{width:36px;height:36px;position:relative;flex-shrink:0}
.qb-mark svg{width:36px;height:36px}
.hdr-t h1{font-size:15px;font-weight:800;color:#fff;letter-spacing:-.2px}
.hdr-t p{font-size:11px;color:rgba(255,255,255,.35);margin-top:1px;font-weight:400}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:8px}
.hbadge{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:4px 12px;font-size:11px;color:rgba(255,255,255,.6);display:flex;align-items:center;gap:5px;font-weight:500}
.hbadge.teal{background:rgba(0,166,143,.2);border-color:rgba(0,166,143,.4);color:#5DDBC9;font-weight:700}
.live-dot{width:6px;height:6px;background:#22c55e;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── TABS ───────────────────────────────────────────── */
.tbar{background:#fff;border-bottom:2px solid var(--g100);display:flex;padding:0 28px;position:sticky;top:60px;z-index:99;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.tbtn{padding:13px 20px;font-size:13px;font-weight:600;color:var(--g400);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap}
.tbtn:hover{color:var(--navy)}
.tbtn.on{color:var(--navy);border-bottom-color:var(--orange);font-weight:800}
.pane{display:none;padding:28px;max-width:1520px;margin:0 auto}
.pane.on{display:block}

/* ── KPI STRIP ──────────────────────────────────────── */
.kpi-strip{display:flex;gap:0;background:#fff;border-radius:14px;border:1px solid var(--g200);box-shadow:var(--sh);margin-bottom:20px;overflow:hidden}
.kpi-cell{flex:1;padding:18px 22px;position:relative;text-align:left}
.kpi-cell+.kpi-cell::before{content:'';position:absolute;left:0;top:15%;height:70%;width:1px;background:var(--g200)}
.kpi-n{font-size:34px;font-weight:900;line-height:1;letter-spacing:-1.5px}
.kpi-l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--g400);margin-top:5px}
.kpi-sub{font-size:11px;color:var(--g500);margin-top:3px;font-weight:500}

/* ── TIMELINE ───────────────────────────────────────── */
.tl-card{background:#fff;border-radius:12px;padding:16px 22px;box-shadow:var(--sh);margin-bottom:22px;border:1px solid var(--g200)}
.tl-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.tl-title{font-size:11px;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.5px}
.tl-stat{font-size:12px;color:var(--g600);font-weight:600}
.tl-track{position:relative;height:10px;background:var(--g100);border-radius:5px;overflow:visible;margin-bottom:5px}
.tl-q2fill{position:absolute;left:0;height:100%;border-radius:5px 0 0 5px;background:linear-gradient(90deg,var(--green),#22c55e)}
.tl-q3{position:absolute;left:33.33%;height:100%;background:var(--blue);opacity:.25;width:33.33%}
.tl-q4{position:absolute;left:66.66%;height:100%;border-radius:0 5px 5px 0;background:var(--purple);opacity:.18;width:33.34%}
.tl-pin{position:absolute;top:-6px;width:20px;height:20px;background:var(--orange);border:3px solid #fff;border-radius:50%;transform:translateX(-50%);box-shadow:0 0 0 3px rgba(255,104,32,.22);z-index:2}
.tl-labels{display:flex;font-size:10px;color:var(--g400);font-weight:600;margin-top:3px}
.tl-ql{flex:1;text-align:center}

/* ── SECTION HEADER ─────────────────────────────────── */
.sec-hd{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.sec-hd h2{font-size:16px;font-weight:900;color:var(--navy);border-left:3px solid var(--orange);padding-left:12px;letter-spacing:-.2px}
.sec-hd p{font-size:12px;color:var(--g400);font-weight:500}

/* ── SP CARDS ───────────────────────────────────────── */
.sp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.sp-card{background:#fff;border-radius:14px;box-shadow:var(--sh);border:1px solid var(--g200);border-top:4px solid;overflow:hidden;display:flex;flex-direction:column;transition:box-shadow .2s,transform .2s}
.sp-card:hover{box-shadow:var(--sh2);transform:translateY(-2px)}
.sp-head{padding:15px 17px 12px}
.sp-top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.sp-key-link{font-size:10px;font-family:'SF Mono','Fira Code',monospace;background:var(--g100);color:var(--g500);border-radius:6px;padding:2px 8px;font-weight:700;letter-spacing:.3px;text-decoration:none}
.sp-key-link:hover{background:var(--blue-lt);color:var(--blue);text-decoration:none}
.sp-title{font-size:14px;font-weight:900;color:var(--navy);line-height:1.2;margin-bottom:2px;letter-spacing:-.2px}
.sp-sub{font-size:11px;color:var(--g400);margin-bottom:7px}
.sp-owner{font-size:11px;color:var(--g600);display:flex;align-items:center;gap:4px}
.sp-owner.vacant{color:var(--amber);font-style:italic}
.sp-progress{padding:11px 17px;border-top:1px solid var(--g100);border-bottom:1px solid var(--g100)}
.sp-prow{display:flex;align-items:baseline;gap:9px;margin-bottom:8px}
.sp-pct{font-size:30px;font-weight:900;line-height:1;letter-spacing:-1px}
.sp-pdelta-up{font-size:11px;font-weight:700;color:var(--green)}
.sp-pdelta-dn{font-size:11px;font-weight:700;color:var(--red)}
.sp-pdelta-flat{font-size:11px;color:var(--g400)}
.sp-items-count{font-size:11px;color:var(--g400);margin-left:auto}
.sp-bar{height:7px;background:var(--g100);border-radius:4px;overflow:hidden}
.sp-fill{height:100%;border-radius:4px;transition:width .7s}
.sp-bar-lbl{font-size:9px;color:var(--g400);margin-top:5px;font-weight:500}
.sp-goals{padding:11px 17px;flex:1}
.sp-goals-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--g400);margin-bottom:8px}
.sp-goal{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;font-size:11.5px;color:var(--g700);line-height:1.45}
.sp-gnum{width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;font-weight:900;color:#fff;margin-top:1px}
.sp-p1s{padding:9px 17px 11px;border-top:1px solid var(--g100);background:var(--g50)}
.sp-p1-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--amber);margin-bottom:7px;display:flex;align-items:center;gap:5px}
.sp-p1-item{display:flex;align-items:center;gap:7px;margin-bottom:5px;font-size:11px;color:var(--g700);line-height:1.4}
.sp-p1-key{font-size:9px;font-family:'SF Mono','Fira Code',monospace;background:rgba(245,158,11,.1);color:#92400E;border-radius:5px;padding:2px 7px;font-weight:800;text-decoration:none;white-space:nowrap;flex-shrink:0}
.sp-p1-key:hover{background:rgba(245,158,11,.22);text-decoration:none}
.sp-p1-more{font-size:10px;color:var(--blue);margin-top:4px;font-weight:600}
.sp-note{padding:7px 17px;font-size:10.5px;color:#92400E;background:var(--amber-lt);border-top:1px solid #FDE68A;display:flex;align-items:flex-start;gap:6px}
.sp-foot{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--g100);background:var(--g50);margin-top:auto}
.sp-fstat{padding:9px 6px;text-align:center;position:relative}
.sp-fstat+.sp-fstat::before{content:'';position:absolute;left:0;top:15%;height:70%;width:1px;background:var(--g200)}
.sp-fsn{font-size:16px;font-weight:900;line-height:1}
.sp-fsl{font-size:8px;text-transform:uppercase;letter-spacing:.6px;color:var(--g400);font-weight:700;display:block;margin-top:2px}
@media(max-width:1200px){.sp-grid{grid-template-columns:1fr 1fr}}
@media(max-width:900px){.sp-grid{grid-template-columns:1fr}}

/* ── PROGRAMS TAB ───────────────────────────────────── */
.prog-filters{display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.prog-filter-lbl{font-size:10px;font-weight:800;color:var(--g400);text-transform:uppercase;letter-spacing:.7px;margin-right:2px}
.pf-btn{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--g200);background:#fff;cursor:pointer;color:var(--g600);transition:all .15s}
.pf-btn.on{background:var(--navy);color:#fff;border-color:var(--navy);box-shadow:0 2px 8px rgba(0,40,85,.2)}
.pf-btn:hover:not(.on){border-color:var(--g400);background:var(--g50)}
.prog-sp-group{background:#fff;border-radius:14px;box-shadow:var(--sh);border:1px solid var(--g200);border-top:4px solid;margin-bottom:16px;overflow:hidden}
.prog-sp-hd{padding:14px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--g100)}
.prog-sp-key{font-size:10px;font-family:monospace;background:var(--g100);color:var(--g500);border-radius:6px;padding:2px 8px;font-weight:700;text-decoration:none}
.prog-sp-key:hover{background:var(--blue-lt);color:var(--blue);text-decoration:none}
.prog-sp-title{font-size:14px;font-weight:800;color:var(--navy)}
.prog-sp-sub{font-size:11px;color:var(--g400);margin-left:4px}
.prog-table{width:100%;border-collapse:collapse}
.prog-th{padding:8px 18px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--g500);border-bottom:1px solid var(--g100);text-align:left;background:var(--g50)}
.prog-row{border-top:1px solid var(--g100);cursor:pointer;transition:background .1s}
.prog-row:hover td{background:#EEF5FF}
.prog-row td{padding:10px 18px;font-size:12.5px;vertical-align:middle}
.prog-title-cell{border-left:3px solid}
.prog-title-cell a{color:var(--g900);font-weight:600}
.prog-title-cell a:hover{color:var(--blue)}
.prog-key-sub{display:block;font-size:10px;color:var(--g400);margin-top:2px;font-family:monospace}
.prio-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:800;letter-spacing:.3px}
.prio-p1{background:rgba(245,158,11,.12);color:#92400E}
.prio-p2{background:var(--blue-lt);color:var(--blue)}
.prio-p3{background:var(--g100);color:var(--g500)}
.status-pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;white-space:nowrap}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── DELIVERABLES ────────────────────────────────────── */
.fl{font-size:11px;font-weight:800;color:var(--g400);text-transform:uppercase;letter-spacing:.6px;margin-right:2px}
.fb{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--g200);background:#fff;cursor:pointer;color:var(--g700);transition:all .15s}
.fb.on{background:var(--navy);color:#fff;border-color:var(--navy);box-shadow:0 2px 8px rgba(0,40,85,.2)}
.fb:hover:not(.on){border-color:var(--g400);background:var(--g50)}
.dch-grid{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px}
.dch-card{display:inline-flex;align-items:center;gap:7px;padding:6px 12px 6px 9px;background:#fff;border-radius:30px;border:1.5px solid var(--g200);cursor:pointer;transition:all .16s;white-space:nowrap;user-select:none;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.dch-card:hover{border-color:var(--g400);box-shadow:0 2px 10px rgba(0,0,0,.1)}
.dch-card.dch-active{box-shadow:0 2px 10px rgba(0,0,0,.12)}
.dch-chdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dch-ch-name{font-size:12px;font-weight:700;color:var(--g700)}
.dch-vsep{width:1px;height:12px;background:var(--g200);flex-shrink:0}
.dch-num{font-size:13px;font-weight:900;line-height:1}
.dch-inf{font-size:11px;color:var(--g400)}
.dch-blk-badge{padding:1px 5px;border-radius:5px;background:var(--red-lt);color:var(--red);font-size:9px;font-weight:700}
.del-toolbar{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.del-label-bar{display:flex;align-items:center;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.lbl-chip{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;border:1.5px solid var(--g200);background:#fff;cursor:pointer;color:var(--g600);transition:all .15s;font-family:'SF Mono','Fira Code',monospace;letter-spacing:.2px}
.lbl-chip.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.lbl-chip:hover:not(.on){border-color:var(--g400);background:var(--g50)}
.del-clear{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:700;border:1.5px solid var(--orange);background:var(--orange);color:#fff;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.del-clear:hover{background:#e85a10}
.del-count{margin-left:auto;font-size:12px;font-weight:700;color:var(--g500)}
.del-table{background:#fff;border-radius:14px;box-shadow:var(--sh);overflow:hidden;border:1px solid var(--g200)}
.del-table-hd{padding:14px 20px;background:var(--qb-dark);display:flex;align-items:center;justify-content:space-between}
.del-table-hd h3{font-size:13px;font-weight:800;color:#fff}
.del-table-hd p{font-size:11px;color:rgba(255,255,255,.4)}
.del-table table{width:100%;border-collapse:collapse}
.del-th{padding:8px 16px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--g500);border-bottom:1px solid var(--g200);text-align:left;background:var(--g50)}
.del-row{border-top:1px solid var(--g100);transition:background .1s;cursor:pointer}
.del-row:nth-child(even) td{background:#FAFBFD}
.del-row:hover td{background:#EEF5FF !important}
.del-row td{padding:9px 16px;font-size:12.5px;vertical-align:middle}
.del-ttl{border-left:4px solid;padding-left:14px !important}
.del-ttl a{color:var(--g900);font-weight:600;line-height:1.4}
.del-ttl a:hover{color:var(--blue)}
.del-key{display:block;font-size:10px;color:var(--g400);margin-top:2px;font-family:monospace;letter-spacing:.3px}
.del-ch-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:10px;font-size:10.5px;font-weight:700}
.del-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.del-lbl{font-size:10px;font-weight:700;font-family:monospace;padding:2px 7px;border-radius:6px;background:var(--g100);color:var(--g600);white-space:nowrap}
.del-date{font-size:11px;color:var(--g500);white-space:nowrap;font-weight:600}
.del-empty{padding:36px;text-align:center;color:var(--g400);font-size:13px}

/* ── ANALYTICS ──────────────────────────────────────── */
.an-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.an-full{grid-column:1/-1}
.an-card{background:#fff;border-radius:14px;box-shadow:var(--sh);padding:22px 24px;border:1px solid var(--g200)}
.an-hd{font-size:14px;font-weight:800;color:var(--navy);margin-bottom:4px}
.an-sub{font-size:11px;color:var(--g400);margin-bottom:18px}
.an-chart-area{overflow-x:auto}
.an-kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.an-kpi{background:var(--g50);border-radius:10px;padding:16px;text-align:center}
.an-kpi-n{font-size:34px;font-weight:900;line-height:1;letter-spacing:-1px}
.an-kpi-l{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--g400);margin-top:5px;display:block}
.an-kpi-sub{font-size:10px;color:var(--g500);margin-top:3px}

/* ── SHARED TAGS ────────────────────────────────────── */
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;white-space:nowrap}
.t-g{background:var(--green-lt);color:var(--green)}.t-b{background:var(--blue-lt);color:var(--blue)}
.t-a{background:var(--amber-lt);color:#92400E}.t-r{background:var(--red-lt);color:var(--red)}
.t-n{background:var(--g100);color:var(--g600)}.t-p{background:var(--purple-lt);color:var(--purple)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.b-on{background:var(--green-lt);color:var(--green)}.b-rk{background:var(--amber-lt);color:#92400E}
.b-off{background:var(--red-lt);color:var(--red)}.b-ip{background:var(--blue-lt);color:var(--blue)}
@media(max-width:1200px){.an-grid{grid-template-columns:1fr}.an-full{grid-column:1}}
</style>
</head>
<body>

<header class="hdr">
  <div class="qb-mark">
    <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="2" width="14" height="14" fill="#00A68F"/>
      <rect x="20" y="2" width="14" height="14" fill="#fff" opacity=".15"/>
      <rect x="2" y="20" width="14" height="14" fill="#fff" opacity=".15"/>
      <rect x="20" y="20" width="14" height="14" fill="#FF6820"/>
    </svg>
  </div>
  <div class="hdr-t">
    <h1>Marketing Executive Dashboard</h1>
    <p>H2 2026 · 7 Strategic Projects · Jira live</p>
  </div>
  <div class="hdr-r">
    <div class="hbadge"><div class="live-dot"></div>Live</div>
    <div class="hbadge teal" id="upd-badge"></div>
  </div>
</header>

<nav class="tbar">
  <button class="tbtn on"  onclick="go('brief',this)">Executive Briefing</button>
  <button class="tbtn"     onclick="go('programs',this)">Programs</button>
  <button class="tbtn"     onclick="go('deliverables',this)">Deliverables</button>
  <button class="tbtn"     onclick="go('analytics',this)">Analytics</button>
</nav>

<div id="brief"        class="pane on"></div>
<div id="programs"     class="pane"></div>
<div id="deliverables" class="pane"></div>
<div id="analytics"    class="pane"></div>

<script>
/* ══════════════════════════════════════════════════════
   DATA
══════════════════════════════════════════════════════ */
const JIRA = "https://quickbase.atlassian.net/browse/";
const jl = (k,l) => `<a href="${JIRA}${k}" target="_blank" rel="noopener">${l||k}</a>`;

const Q2_PCT     = 85;
const DAYS_TO_H2 = 14; // Jun 17 → Jul 1

const DATA = {
  lastUpdated: "Jun 17, 2026",
  weekInQ2: 12, weeksInQ2: 13,

  initiatives:[
    {key:"MKT-12568",title:"Growth — Next Gen",sub:"FastField + Pave",
     owner:"Gar Smyth",status:"on-track",pct:62,done:52,flight:24,blocked:2,total:84,color:"#0066D6",delta:+4,note:"",
     goals:["Focus on Pave ICP — Field & Business Ops","Critical FF & Pave product launches","Ramp content & social engine on YouTube/LinkedIn"],

function badge(s){const c=SC[s]||SC["on-track"];return `<span class="badge ${c.cls}"><span style="width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block"></span>${c.label}</span>`;}

function go(id,btn){

function renderPrograms(){
  const spBtns = ['All',...DATA.initiatives.map(i=>i.key)].map(k=>{
    const ini = DATA.initiatives.find(i=>i.key===k);
    const lbl = ini ? ini.title.split('—')[0].trim().replace('Corporate Communications','Corp Comms').replace('Marketing Systems & AI','Systems & AI').replace('Program Management','PM') : 'All';
    return `<button class="pf-btn${ofSP===k?' on':''}" onclick="setProgFilter('sp','${k}')">${lbl}</button>`;
  }).join('');
  const prioBtns = ['All','P1','P2','P3'].map(p=>`<button class="pf-btn${ofPrio===p?' on':''}" onclick="setProgFilter('prio','${p}')">${p==='All'?'All Priorities':p}</button>`).join('');

  const spKeys = DATA.initiatives.map(i=>i.key).filter(k=>ofSP==='All'||k===ofSP);
  const groups = spKeys.map(spKey=>{
    const ini = DATA.initiatives.find(i=>i.key===spKey);
    const progs = DATA.programs.filter(p=>p.sp===spKey&&(ofPrio==='All'||p.priority===ofPrio));
    if(!progs.length) return '';
    const rows = progs.map(p=>{
      const [dotCol]=STATUS_DOT[p.status]||["var(--g300)",""];
      return `<tr class="prog-row" onclick="window.open('${JIRA}${p.key}','_blank')">
        <td class="prog-title-cell" style="border-left-color:${ini.color}">
          <a href="${JIRA}${p.key}" target="_blank" onclick="event.stopPropagation()">${p.title}</a>
          <span class="prog-key-sub">${p.key}</span>
        </td>
        <td>${prioBadge(p.priority)}</td>
        <td><span class="status-pill"><span class="sdot" style="background:${dotCol}"></span>${(STATUS_DOT[p.status]||["","Unknown"])[1]}</span></td>
        <td style="font-size:12px;color:var(--g600)">${p.owner||'<em style="color:var(--g400)">Unassigned</em>'}</td>
      </tr>`;
    }).join('');
    return `
    <div class="prog-sp-group" style="border-top-color:${ini.color}">
      <div class="prog-sp-hd">
        <a href="${JIRA}${ini.key}" target="_blank" class="prog-sp-key">${ini.key}</a>
        <span class="prog-sp-title">${ini.title}</span>
        <span class="prog-sp-sub">— ${ini.sub||''}</span>
        <span style="margin-left:auto">${badge(ini.status)}</span>

      <table class="prog-table">
        <thead><tr>
          <th class="prog-th">Program / Epic</th>
          <th class="prog-th">Priority</th>
          <th class="prog-th">Status</th>
          <th class="prog-th">Owner</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }).join('');

  document.getElementById('programs').innerHTML=`
    <div class="sec-hd">
      <h2>Programs</h2>
      <p>Epics by Strategic Project · click any row to open in Jira</p>
    </div>
    <div class="prog-filters">
      <span class="prog-filter-lbl">Project:</span>${spBtns}
    </div>
    <div class="prog-filters" style="margin-top:-10px">
      <span class="prog-filter-lbl">Priority:</span>${prioBtns}
    </div>
    ${groups||`<div style="padding:40px;text-align:center;color:var(--g400)">No programs match the current filter</div>`}`;
}

function setProgFilter(w,v){
  if(w==='sp')ofSP=v; else ofPrio=v;
  document.getElementById('programs').innerHTML='';
  renderPrograms();
}

function setOF(w,v){
  if(w==='bu')ofBU=v; else if(w==='ch')ofCh=v; else if(w==='lbl')ofLbl=v;

/* ══════════════════════════════════════════════════════

══════════════════════════════════════════════════════ */
function renderAnalytics(){
  const inits=DATA.initiatives;
  const totalDone=inits.reduce((s,i)=>s+i.done,0);
  const totalItems=inits.reduce((s,i)=>s+i.total,0);
  const q2Actual=Math.round(totalDone/totalItems*100);
  const q2Expected=Math.round(DATA.weekInQ2/DATA.weeksInQ2*100);
  const paceDiff=q2Actual-q2Expected;

  // Chart 1: Initiative bars
  const barH=22,gap=13,labelW=190,barW=290;
  const svgH=inits.length*(barH+gap)+10;
  const shortT=t=>t.replace(' — Next Gen','').replace('Corporate ','').replace('Marketing Systems','Systems').replace('Program Management','PM');
  const bars1=inits.map((ini,i)=>{const y=i*(barH+gap);const bw=Math.round(ini.pct/100*barW);return `
    <rect x="${labelW}" y="${y}" width="${barW}" height="${barH}" rx="5" fill="#F1F5F9"/>
    <rect x="${labelW}" y="${y}" width="${bw||3}" height="${barH}" rx="5" fill="${ini.color}" opacity=".85"/>
    <text x="${labelW-10}" y="${y+15}" text-anchor="end" font-size="11" fill="#475569" font-weight="600">${shortT(ini.title)}</text>
    <text x="${labelW+bw+8}" y="${y+15}" font-size="12" font-weight="800" fill="${ini.color}">${ini.pct}%</text>`;
  }).join('');

  // Chart 2: Channel donut
  const cc={};DATA.shipped.forEach(i=>{cc[i.ch]=(cc[i.ch]||0)+1;});
  const ct=Object.values(cc).reduce((s,v)=>s+v,0);
  const ce=Object.entries(cc).sort((a,b)=>b[1]-a[1]);
  let cum=0;
  const slices=ce.map(([ch,n])=>{
    const pct=Math.round(n/ct*100),col=CH_COLORS[ch]||'#94A3B8';
    const s=`<circle cx="18" cy="18" r="15.9155" fill="none" stroke="${col}" stroke-width="4.5" stroke-dasharray="${pct} ${100-pct}" stroke-dashoffset="${100-cum+25}" style="transform:rotate(-90deg);transform-origin:50% 50%"/>`;
    cum+=pct;return {s,ch,n,pct,col};
  });
  const legend2=slices.map(s=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
    <div style="width:9px;height:9px;border-radius:50%;background:${s.col};flex-shrink:0"></div>
    <span style="font-size:12px;color:var(--g700);flex:1">${s.ch}</span>
    <span style="font-size:12px;font-weight:800">${s.n}</span>
    <span style="font-size:10px;color:var(--g400);width:28px;text-align:right">${s.pct}%</span>
  </div>`).join('');
  const chart2=`<div style="display:flex;align-items:flex-start;gap:24px">
    <svg width="140" height="140" viewBox="0 0 36 36" style="flex-shrink:0;filter:drop-shadow(0 4px 12px rgba(0,40,85,.1))">
      <circle cx="18" cy="18" r="15.9155" fill="none" stroke="#F1F5F9" stroke-width="4"/>
      ${slices.map(s=>s.s).join('')}
      <text x="18" y="16.5" text-anchor="middle" font-size="6" font-weight="900" fill="#002855">${ct}</text>
      <text x="18" y="21" text-anchor="middle" font-size="3" fill="#94A3B8">shipped Q2</text>
    </svg>
    <div style="flex:1;padding-top:4px">${legend2}</div>
  </div>`;

  // BU bars
  const buData=[
    {name:"FastField",done:17,flight:13,blocked:2,col:"#0066D6"},
    {name:"Pave",done:26,flight:22,blocked:2,col:"#7C3AED"},
    {name:"Core (QB)",done:24,flight:10,blocked:1,col:"#14A558"},
    {name:"Cross-BU",done:12,flight:8,blocked:1,col:"#0891B2"},
  ];
  const buBars=buData.map(bu=>{
    const tot=bu.done+bu.flight+bu.blocked;
    const dP=Math.round(bu.done/tot*100),fP=Math.round(bu.flight/tot*100);
    return `<div style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px">
        <strong style="font-size:13px;color:var(--navy)">${bu.name}</strong>
        <span style="font-size:11px;color:var(--g500)">${bu.done} done · ${bu.flight} active${bu.blocked>0?` · <span style="color:var(--red);font-weight:700">${bu.blocked} blocked</span>`:''}</span>
      </div>
      <div style="height:16px;border-radius:8px;overflow:hidden;display:flex;background:var(--g100)">
        <div style="width:${dP}%;background:var(--green)"></div>
        <div style="width:${fP}%;background:${bu.col};opacity:.7"></div>
      </div>
      <div style="text-align:right;margin-top:4px;font-size:11px;font-weight:700;color:${dP>=50?'var(--green)':'var(--g500)'}">${dP}% complete</div>
    </div>`;
  }).join('');

  document.getElementById('analytics').innerHTML=`
    <div class="sec-hd"><h2>Analytics</h2><p>Updated ${DATA.lastUpdated}</p></div>

    <div class="an-card an-full" style="border-top:3px solid var(--green);margin-bottom:16px">
      <div class="an-hd">H2 Jira Structure — Live</div>
      <div class="an-sub">Hierarchy applied Jun 17 · 66 parent assignments · 77 cross-project links · priorities set across all 66 initiatives</div>
      <div class="an-kpi-row">
        <div class="an-kpi" style="border-top:3px solid var(--navy)">
          <div class="an-kpi-n" style="color:var(--navy)">7</div>
          <span class="an-kpi-l">Strategic Projects</span>
          <div class="an-kpi-sub">${jl('MKT-12568','12568')}–${jl('MKT-12574','12574')}</div>
        </div>
        <div class="an-kpi" style="border-top:3px solid var(--blue)">
          <div class="an-kpi-n" style="color:var(--blue)">66</div>
          <span class="an-kpi-l">Parent Assignments</span>
          <div class="an-kpi-sub">Initiatives → Strategic Projects</div>
        </div>
        <div class="an-kpi" style="border-top:3px solid var(--teal)">
          <div class="an-kpi-n" style="color:var(--teal)">77</div>
          <span class="an-kpi-l">Cross-Project Links</span>
          <div class="an-kpi-sub">"Relates To" — shared initiatives</div>
        </div>
      </div>
    </div>

    <div class="an-card an-full" style="border-top:3px solid var(--orange);margin-bottom:16px">
      <div class="an-hd">Q2 Velocity — Week ${DATA.weekInQ2} of ${DATA.weeksInQ2}</div>
      <div class="an-sub">Expected vs actual completion pace</div>
      <div style="display:grid;grid-template-columns:3fr 2fr;gap:28px;align-items:start">
        <div>
          <div style="margin-bottom:14px">
            <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px">
              <span style="font-size:12px;font-weight:700;color:var(--g600)">Expected at week ${DATA.weekInQ2}</span>
              <span style="font-size:16px;font-weight:900;color:var(--g500)">${q2Expected}%</span>
            </div>
            <div style="height:13px;border-radius:7px;background:var(--g100);overflow:hidden"><div style="width:${q2Expected}%;height:100%;background:#CBD5E1;border-radius:7px"></div></div>
          </div>
          <div style="margin-bottom:20px">
            <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px">
              <span style="font-size:12px;font-weight:700;color:var(--g600)">Actual completion</span>
              <span style="font-size:16px;font-weight:900;color:${q2Actual>=q2Expected?'var(--green)':'var(--orange)'}">${q2Actual}%</span>
            </div>
            <div style="height:13px;border-radius:7px;background:var(--g100);overflow:hidden"><div style="width:${q2Actual}%;height:100%;background:${q2Actual>=q2Expected?'var(--green)':'var(--orange)'};border-radius:7px;transition:width .7s"></div></div>
          </div>
          <div style="background:${paceDiff>=0?'var(--green-lt)':'var(--amber-lt)'};border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:16px">
            <span style="font-size:30px;font-weight:900;color:${paceDiff>=0?'var(--green)':'#92400E'};line-height:1">${paceDiff>=0?'+':''}${paceDiff}%</span>
            <div>
              <div style="font-size:14px;font-weight:800;color:${paceDiff>=0?'var(--green)':'#92400E'}">${paceDiff>=0?'Ahead of pace':'Behind pace'}</div>
              <div style="font-size:11px;color:var(--g500);margin-top:3px">${DATA.weeksInQ2-DATA.weekInQ2} week left · Q3 starts Jul 1</div>
            </div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div class="an-kpi" style="border-top:3px solid var(--green)"><div class="an-kpi-n" style="color:var(--green)">${totalDone}</div><span class="an-kpi-l">Done</span></div>
          <div class="an-kpi" style="border-top:3px solid var(--navy)"><div class="an-kpi-n" style="color:var(--navy)">${totalItems}</div><span class="an-kpi-l">Total</span></div>
          <div class="an-kpi" style="border-top:3px solid var(--purple)"><div class="an-kpi-n" style="color:var(--purple)">${Math.round(totalDone/DATA.weekInQ2)}<span style="font-size:13px">/wk</span></div><span class="an-kpi-l">Velocity</span></div>
          <div class="an-kpi" style="border-top:3px solid var(--amber)"><div class="an-kpi-n" style="color:var(--amber)">${DATA.weeksInQ2-DATA.weekInQ2}</div><span class="an-kpi-l">Wks Left</span></div>
        </div>
      </div>
    </div>

    <div class="an-grid">
      <div class="an-card" style="border-top:3px solid var(--navy)">
        <div class="an-hd">Initiative Completion %</div>
        <div class="an-sub">Progress across all 7 H2 Strategic Projects</div>
        <div class="an-chart-area"><svg width="${labelW+barW+50}" height="${svgH}" xmlns="http://www.w3.org/2000/svg" font-family="Inter,system-ui,sans-serif">${bars1}</svg></div>
      </div>
      <div class="an-card" style="border-top:3px solid var(--blue)">
        <div class="an-hd">Output by Channel</div>
        <div class="an-sub">${ct} Q2 deliverables by channel</div>
        ${chart2}
      </div>
      <div class="an-card" style="border-top:3px solid var(--purple)">
        <div class="an-hd">BU Workload</div>
        <div class="an-sub">Done · Active · Blocked by Business Unit</div>
        ${buBars}
        <div style="display:flex;gap:12px;margin-top:10px;font-size:11px">
          <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:var(--green);display:inline-block"></span>Done</span>
          <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:var(--blue);opacity:.7;display:inline-block"></span>Active</span>
        </div>
      </div>
    </div>`;
}

/* ══════════════════════════════════════════════════════
   BOOT
══════════════════════════════════════════════════════ */
document.getElementById('upd-badge').textContent = DATA.lastUpdated;
renderBriefing();
</script>
</body>
</html>
